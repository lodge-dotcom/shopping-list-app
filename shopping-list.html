<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px 20px;
      color: white;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .summary {
      font-size: 13px;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 11px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area input::placeholder {
      color: #aab;
    }

    .btn-add {
      padding: 11px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover {
      opacity: 0.88;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .filter-bar {
      display: flex;
      padding: 12px 24px;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
      font-weight: 600;
    }

    .list {
      padding: 12px 0;
      min-height: 120px;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 14px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover {
      background: #fafafa;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .item.done .checkbox {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox svg {
      display: none;
    }

    .item.done .checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e74c3c;
      background: #fef2f2;
    }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 13px;
      color: #999;
    }

    .btn-clear {
      font-size: 13px;
      color: #e74c3c;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-clear:hover {
      background: #fef2f2;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="summary" id="summary">아이템이 없습니다</div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="아이템 입력..." maxlength="60">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('todo', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <span id="count-label"></span>
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(it =>
        filter === 'all' ? true :
        filter === 'done' ? it.done :
        !it.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">항목이 없습니다</div>';
      } else {
        list.innerHTML = filtered.map(it => `
          <div class="item ${it.done ? 'done' : ''}" id="item-${it.id}">
            <div class="checkbox" onclick="toggle(${it.id})">
              <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-text">${escHtml(it.text)}</span>
            <button class="btn-delete" onclick="deleteItem(${it.id})">✕</button>
          </div>
        `).join('');
      }

      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('summary').textContent =
        total === 0 ? '아이템이 없습니다' : `${done} / ${total} 완료`;
      document.getElementById('count-label').textContent =
        `총 ${total}개 · 완료 ${done}개`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addItem() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggle(id) {
      const it = items.find(i => i.id === id);
      if (it) it.done = !it.done;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      if (!items.some(i => i.done)) return;
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
